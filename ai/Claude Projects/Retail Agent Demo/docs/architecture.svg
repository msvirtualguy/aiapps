  <text x="30" y="434" font-size="9"  fill="#ef4444" font-style="italic">https://&lt;nai-endpoint&gt;/enterpriseai/v1  (OpenAI-compatible REST)</text>

  <!-- LLM + Vision box -->
  <rect x="28" y="444" width="272" height="176" rx="8" fill="white" stroke="#f87171" stroke-width="1.5"/>
  <text x="164" y="462" font-size="10" font-weight="700" fill="#cc3300" text-anchor="middle">LLM  +  Vision</text>
  <text x="164" y="477" font-size="9"  fill="#4b5563"    text-anchor="middle">Model: qwen25-vl7b-in-nvfp4</text>
  <text x="164" y="492" font-size="8"  fill="#64748b"    text-anchor="middle">Chat completions  ·  Tool calling</text>
  <text x="164" y="506" font-size="8"  fill="#64748b"    text-anchor="middle">SSE agentic response loop</text>
  <text x="164" y="520" font-size="8"  fill="#64748b"    text-anchor="middle">Webcam photo → persona JSON</text>
  <text x="164" y="534" font-size="8"  fill="#64748b"    text-anchor="middle">Grocery list image → OCR</text>
  <text x="164" y="548" font-size="8"  fill="#64748b"    text-anchor="middle">Nutrition detail on request</text>
  <text x="164" y="562" font-size="7"  fill="#9ca3af"    text-anchor="middle">Fallback: DEFAULT_PERSONA on error</text>
  <text x="164" y="576" font-size="7"  fill="#9ca3af"    text-anchor="middle">max_tokens: 512–2048  ·  temp: 0.7</text>
  <text x="164" y="588" font-size="7"  fill="#9ca3af"    text-anchor="middle">System prompt: FreshBot + persona ctx</text>
  <text x="164" y="600" font-size="7"  fill="#9ca3af"    text-anchor="middle">6 tools: search · details · cart · promos</text>
  <text x="164" y="610" font-size="7"  fill="#9ca3af"    text-anchor="middle"> </text>

  <!-- Embeddings box -->
  <rect x="316" y="444" width="280" height="176" rx="8" fill="white" stroke="#f87171" stroke-width="1.5"/>
  <text x="456" y="462" font-size="10" font-weight="700" fill="#cc3300" text-anchor="middle">Embeddings</text>
  <text x="456" y="477" font-size="9"  fill="#4b5563"    text-anchor="middle">Model: ll-nemo-embed-1b-v2</text>
  <text x="456" y="492" font-size="8"  fill="#64748b"    text-anchor="middle">Product vectorization  (42 items)</text>
  <text x="456" y="506" font-size="8"  fill="#64748b"    text-anchor="middle">Query encoding for search</text>
  <text x="456" y="520" font-size="8"  fill="#64748b"    text-anchor="middle">Cosine similarity  (in-process)</text>
  <text x="456" y="534" font-size="8"  fill="#64748b"    text-anchor="middle">Module-level cache at startup</text>
  <text x="456" y="548" font-size="8"  fill="#64748b"    text-anchor="middle">Zero-shot intent matching</text>
  <text x="456" y="562" font-size="7"  fill="#9ca3af"    text-anchor="middle">~5s cold start → warm thereafter</text>
  <text x="456" y="576" font-size="7"  fill="#9ca3af"    text-anchor="middle">No external vector DB required</text>
  <text x="456" y="590" font-size="7"  fill="#9ca3af"    text-anchor="middle">embeddings-cache.ts  (lib/)</text>
  <text x="456" y="604" font-size="7"  fill="#9ca3af"    text-anchor="middle">semanticSearch(query, topK=6)</text>

  <!-- Arrow NAI → Storage (serves models) -->
  <line x1="672" y1="518" x2="628" y2="518" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>
  <text x="630" y="513" font-size="8" fill="#2e7d32" font-weight="600">serves</text>

  <!-- ── Nutanix Storage ─────────────────────────────────────────────────────── -->
  <rect x="628" y="400" width="316" height="236" rx="12" fill="#f0fdf4" stroke="#2e7d32" stroke-width="2"/>
  <text x="644" y="420" font-size="10" font-weight="700" fill="#2e7d32" letter-spacing="0.5">NUTANIX UNIFIED STORAGE</text>

  <!-- Model Repo box -->
  <rect x="642" y="432" width="288" height="88" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="786" y="452" font-size="10" font-weight="700" fill="#2e7d32" text-anchor="middle">LLM Model Repository</text>
  <text x="786" y="468" font-size="9"  fill="#4b5563"    text-anchor="middle">qwen25-vl7b-in-nvfp4  weights &amp; configs</text>
  <text x="786" y="482" font-size="9"  fill="#64748b"    text-anchor="middle">ll-nemo-embed-1b-v2  weights</text>
  <text x="786" y="496" font-size="8"  fill="#9ca3af"    text-anchor="middle">Loaded by NAI inference pods at startup</text>
  <text x="786" y="510" font-size="7"  fill="#9ca3af"    text-anchor="middle">GPU-accelerated inference  ·  FP4 quantized</text>

  <!-- Nutanix Volumes box -->
  <rect x="642" y="532" width="288" height="88" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="786" y="552" font-size="10" font-weight="700" fill="#2e7d32" text-anchor="middle">Nutanix Volumes  (PVC)</text>
  <text x="786" y="568" font-size="9"  fill="#4b5563"    text-anchor="middle">Persistent block storage for model data</text>
  <text x="786" y="582" font-size="9"  fill="#64748b"    text-anchor="middle">ReadWriteOnce  ·  High-IOPS tier</text>
  <text x="786" y="596" font-size="8"  fill="#9ca3af"    text-anchor="middle">Model artifacts survive pod restarts</text>
  <text x="786" y="610" font-size="7"  fill="#9ca3af"    text-anchor="middle">Nutanix AOS storage fabric</text>

  <!-- ── Footer legend ─────────────────────────────────────────────────────── -->
  <text x="20" y="648" font-size="8" fill="#94a3b8">
    → HTTPS (OpenAI-compatible)  ·  - - → Model weights served to NAI  ·  SSE = Server-Sent Events  ·  IP addresses and API keys configured via K8s ConfigMap and Secret at runtime
  </text>
</svg>
