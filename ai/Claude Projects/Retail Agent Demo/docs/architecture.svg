<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" width="960" height="660" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0 8 3 0 6" fill="#64748b"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0 8 3 0 6" fill="#1a6bb5"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0 8 3 0 6" fill="#cc3300"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0 8 3 0 6" fill="#2e7d32"/></marker>
  </defs>

  <!-- ── AHV Outer ─────────────────────────────────────────────────────────── -->
  <rect x="4" y="4" width="952" height="652" rx="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="20" y="21" font-size="10" font-weight="700" fill="#64748b" letter-spacing="1.5">NUTANIX AHV HYPERVISOR</text>

  <!-- ── K3s Cluster ───────────────────────────────────────────────────────── -->
  <rect x="16" y="28" width="926" height="358" rx="12" fill="#eff6ff" stroke="#1a6bb5" stroke-width="2"/>
  <text x="30" y="46" font-size="10" font-weight="700" fill="#1a6bb5" letter-spacing="0.5">K3S KUBERNETES CLUSTER  ·  retail-agent namespace</text>

  <!-- ── Next.js App ───────────────────────────────────────────────────────── -->
  <rect x="28" y="54" width="530" height="318" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="293" y="72" font-size="10" font-weight="700" fill="#1d4ed8" text-anchor="middle">Next.js 14  ·  App Router  ·  TypeScript  ·  Port 3000</text>

  <!-- page boxes -->
  <rect x="42"  y="80" width="118" height="72" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="101" y="98"  font-size="9"  font-weight="700" fill="#1d4ed8" text-anchor="middle">/  Welcome</text>
  <text x="101" y="112" font-size="8"  fill="#4b5563"    text-anchor="middle">Webcam capture</text>
  <text x="101" y="124" font-size="8"  fill="#4b5563"    text-anchor="middle">Demo personas</text>
  <text x="101" y="136" font-size="8"  fill="#4b5563"    text-anchor="middle">Vision → Persona</text>
  <text x="101" y="147" font-size="7"  fill="#6b7280"    text-anchor="middle">useWebcam hook</text>

  <rect x="170" y="80" width="118" height="72" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="229" y="98"  font-size="9"  font-weight="700" fill="#1d4ed8" text-anchor="middle">/shop</text>
  <text x="229" y="112" font-size="8"  fill="#4b5563"    text-anchor="middle">AI Chat panel</text>
  <text x="229" y="124" font-size="8"  fill="#4b5563"    text-anchor="middle">Product grid</text>
  <text x="229" y="136" font-size="8"  fill="#4b5563"    text-anchor="middle">Cart sidebar</text>
  <text x="229" y="147" font-size="7"  fill="#6b7280"    text-anchor="middle">Past orders modal</text>

  <rect x="298" y="80" width="122" height="72" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="359" y="98"  font-size="9"  font-weight="700" fill="#1d4ed8" text-anchor="middle">/checkout</text>
  <text x="359" y="112" font-size="8"  fill="#4b5563"    text-anchor="middle">Apple Pay · Venmo</text>
  <text x="359" y="124" font-size="8"  fill="#4b5563"    text-anchor="middle">Credit / Debit card</text>
  <text x="359" y="136" font-size="8"  fill="#4b5563"    text-anchor="middle">Shipping selector</text>
  <text x="359" y="147" font-size="7"  fill="#6b7280"    text-anchor="middle">Order confirmation</text>

  <rect x="430" y="80" width="114" height="72" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="487" y="98"  font-size="9"  font-weight="700" fill="#1d4ed8" text-anchor="middle">/architecture</text>
  <text x="487" y="112" font-size="8"  fill="#4b5563"    text-anchor="middle">Visual infra</text>
  <text x="487" y="124" font-size="8"  fill="#4b5563"    text-anchor="middle">diagram</text>
  <text x="487" y="136" font-size="8"  fill="#4b5563"    text-anchor="middle">Component map</text>
  <text x="487" y="147" font-size="7"  fill="#6b7280"    text-anchor="middle">Agent tools</text>

  <!-- API Routes -->
  <rect x="42" y="162" width="502" height="50" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="293" y="180" font-size="9"  font-weight="700" fill="#1d4ed8" text-anchor="middle">API Routes  (Server-Side)</text>
  <text x="293" y="195" font-size="8"  fill="#475569"    text-anchor="middle">/api/analyze-user  ·  /api/chat (SSE stream)  ·  /api/search-products  ·  /api/scan-list  ·  /api/cart  ·  /api/products/[id]</text>
  <text x="293" y="206" font-size="7"  fill="#64748b"    text-anchor="middle">Vision→Persona  ·  LLM + Tool loop  ·  Embeddings→ranked Products  ·  OCR  ·  Cart CRUD  ·  Lookup</text>

  <!-- Agentic Pipeline -->
  <rect x="42" y="222" width="502" height="40" rx="5" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  <text x="293" y="238" font-size="8"  font-weight="700" fill="#92400e" text-anchor="middle">Agentic Loop (SSE):  User query → LLM decides tool → Tool executes → LLM generates response → streamed to client</text>
  <text x="293" y="254" font-size="8"  fill="#78350f"    text-anchor="middle">Semantic Search:  Query → embed (NAI) → cosine_sim (in-process cache) → top-k ranked products returned</text>

  <!-- State / Context -->
  <rect x="42" y="272" width="502" height="88" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="293" y="290" font-size="9"  font-weight="700" fill="#166534" text-anchor="middle">State  &amp;  Context</text>
  <text x="293" y="305" font-size="8"  fill="#374151"    text-anchor="middle">CartContext + PersonaContext  (React Context + localStorage)  ·  Server cart: Map&lt;sessionId, CartItem[]&gt;</text>
  <text x="293" y="319" font-size="8"  fill="#374151"    text-anchor="middle">4 demo personas: Sarah Mitchell · Jordan Rivera · Marcus Chen · Dorothy Walsh</text>
  <text x="293" y="333" font-size="8"  fill="#4b5563"    text-anchor="middle">Each has past orders, payment method, personalized deals, shipping preference</text>
  <text x="293" y="347" font-size="7"  fill="#6b7280"    text-anchor="middle">PastOrdersModal: reorder full cart or cherry-pick items  ·  42 products · 9 categories · full nutrition data</text>

  <!-- ── MetalLB ─────────────────────────────────────────────────────────────── -->
  <rect x="574" y="54" width="178" height="100" rx="8" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="663" y="74"  font-size="10" font-weight="700" fill="#b45309" text-anchor="middle">MetalLB Service</text>
  <text x="663" y="90"  font-size="9"  fill="#4b5563"    text-anchor="middle">Type: LoadBalancer</text>
  <text x="663" y="104" font-size="9"  fill="#64748b"    text-anchor="middle">Port 80 → container 3000</text>
  <text x="663" y="118" font-size="8"  fill="#64748b"    text-anchor="middle">External IP (DHCP pool)</text>
  <text x="663" y="130" font-size="7"  fill="#9ca3af"    text-anchor="middle">Readiness + liveness probes</text>
  <text x="663" y="141" font-size="7"  fill="#9ca3af"    text-anchor="middle">10s / 20s initial delay</text>

  <!-- Arrow MetalLB → User/Browser -->
  <line x1="663" y1="154" x2="663" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── User / Browser ──────────────────────────────────────────────────────── -->
  <rect x="574" y="170" width="178" height="198" rx="8" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="663" y="190" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">User / Browser</text>
  <text x="663" y="206" font-size="9"  fill="#4b5563"    text-anchor="middle">HTTPS → LoadBalancer IP</text>
  <text x="663" y="220" font-size="8"  fill="#64748b"    text-anchor="middle">getUserMedia  (webcam API)</text>
  <text x="663" y="234" font-size="8"  fill="#64748b"    text-anchor="middle">SSE  (streaming chat)</text>
  <text x="663" y="248" font-size="8"  fill="#64748b"    text-anchor="middle">localStorage  (cart + persona)</text>
  <text x="663" y="262" font-size="8"  fill="#64748b"    text-anchor="middle">Framer Motion  animations</text>
  <text x="663" y="276" font-size="8"  fill="#64748b"    text-anchor="middle">Plus Jakarta Sans  font</text>
  <text x="663" y="290" font-size="7"  fill="#9ca3af"    text-anchor="middle">Tailwind CSS  ·  Lucide icons</text>
  <text x="663" y="304" font-size="7"  fill="#9ca3af"    text-anchor="middle">brand color: #F33F3F</text>
  <text x="663" y="318" font-size="7"  fill="#9ca3af"    text-anchor="middle">dark/light  theme support</text>
  <text x="663" y="332" font-size="7"  fill="#9ca3af"    text-anchor="middle">AnimatePresence  stagger</text>
  <text x="663" y="346" font-size="7"  fill="#9ca3af"    text-anchor="middle">GroceryListScanner  (OCR)</text>
  <text x="663" y="358" font-size="7"  fill="#9ca3af"    text-anchor="middle">ProductGrid  ·  CartSidebar</text>
  <text x="663" y="363" font-size="7"  fill="#9ca3af"    text-anchor="middle"> </text>

  <!-- ── K8s Config (far right) ─────────────────────────────────────────────── -->
  <rect x="768" y="54" width="162" height="318" rx="8" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="849" y="74"  font-size="10" font-weight="700" fill="#374151" text-anchor="middle">K8s Config</text>
  <text x="849" y="92"  font-size="9"  fill="#4b5563"    text-anchor="middle">Namespace: retail-agent</text>
  <text x="849" y="108" font-size="8"  fill="#64748b"    text-anchor="middle">ConfigMap:</text>
  <text x="849" y="121" font-size="8"  fill="#64748b"    text-anchor="middle">NAI base URL</text>
  <text x="849" y="134" font-size="8"  fill="#64748b"    text-anchor="middle">LLM model name</text>
  <text x="849" y="147" font-size="8"  fill="#64748b"    text-anchor="middle">Vision model name</text>
  <text x="849" y="160" font-size="8"  fill="#64748b"    text-anchor="middle">Embeddings model</text>
  <text x="849" y="173" font-size="8"  fill="#64748b"    text-anchor="middle">TLS bypass flag</text>
  <line x1="790" y1="182" x2="928" y2="182" stroke="#e2e8f0" stroke-width="1"/>
  <text x="849" y="196" font-size="8"  fill="#64748b"    text-anchor="middle">Secret:</text>
  <text x="849" y="209" font-size="8"  fill="#64748b"    text-anchor="middle">NAI_API_KEY</text>
  <text x="849" y="222" font-size="7"  fill="#9ca3af"    text-anchor="middle">(runtime inject only)</text>
  <line x1="790" y1="231" x2="928" y2="231" stroke="#e2e8f0" stroke-width="1"/>
  <text x="849" y="245" font-size="8"  fill="#64748b"    text-anchor="middle">Deployment:</text>
  <text x="849" y="258" font-size="8"  fill="#64748b"    text-anchor="middle">1 replica</text>
  <text x="849" y="271" font-size="8"  fill="#64748b"    text-anchor="middle">CPU 250m – 1000m</text>
  <text x="849" y="284" font-size="8"  fill="#64748b"    text-anchor="middle">RAM 256Mi – 512Mi</text>
  <line x1="790" y1="293" x2="928" y2="293" stroke="#e2e8f0" stroke-width="1"/>
  <text x="849" y="307" font-size="8"  fill="#64748b"    text-anchor="middle">Image:</text>
  <text x="849" y="320" font-size="8"  fill="#64748b"    text-anchor="middle">retail-agent-demo:v4</text>
  <text x="849" y="333" font-size="7"  fill="#9ca3af"    text-anchor="middle">Multi-stage Docker build</text>
  <text x="849" y="346" font-size="7"  fill="#9ca3af"    text-anchor="middle">Node 20 Alpine · ~150MB</text>
  <text x="849" y="359" font-size="7"  fill="#9ca3af"    text-anchor="middle">output: standalone</text>

  <!-- ── HTTPS Arrow K3s → NAI ─────────────────────────────────────────────── -->
  <line x1="260" y1="386" x2="260" y2="400" stroke="#1a6bb5" stroke-width="2" marker-end="url(#arr-b)"/>
