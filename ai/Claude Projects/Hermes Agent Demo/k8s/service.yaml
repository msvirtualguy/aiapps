apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: agent
spec:
  # Hermes connects to Telegram via outbound polling — no inbound port is needed.
  # This ClusterIP service exists for:
  #   - kubectl port-forward for local debugging
  #   - Future addition of a web UI or metrics endpoint
  type: ClusterIP
  selector:
    app: hermes
  ports:
    # Placeholder port — not used by the Telegram gateway mode.
    # Remove or repurpose if a web UI / metrics port is added.
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP
