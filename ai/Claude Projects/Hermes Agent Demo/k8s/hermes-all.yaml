# ══════════════════════════════════════════════════════════════════════════════
# Hermes Agent — consolidated deployment manifest (envsubst template)
#
# This file uses ${VAR} placeholders populated from config/.env.template at
# deploy time. Never contains real credentials — safe to commit.
#
# Deploy:
#   set -a && source config/.env.template && set +a
#   envsubst < k8s/hermes-all.yaml | kubectl apply -f -
#
# Or use the helper script:
#   bash deploy.sh
#
# Day-2 operations:
#   Restart: kubectl rollout restart deployment/hermes -n hermes-agent
#   Logs:    kubectl logs -n hermes-agent deploy/hermes -f
#   Shell:   kubectl exec -it -n hermes-agent deploy/hermes -- hermes
# ══════════════════════════════════════════════════════════════════════════════

---
# ── 1. Namespace ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/part-of: hermes-agent

---
# ── 2. Secret ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: config
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  OPENAI_BASE_URL: "${OPENAI_BASE_URL}"
  NAI_MODEL: "${NAI_MODEL}"
  TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
  TELEGRAM_ALLOWED_USERS: "${TELEGRAM_ALLOWED_USERS}"
  SERPAPI_API_KEY: "${SERPAPI_API_KEY}"
  MCP_SERPAPI_TOKEN: "${MCP_SERPAPI_TOKEN}"

---
