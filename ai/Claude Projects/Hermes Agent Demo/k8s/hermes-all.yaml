---
# ── 4. ConfigMap (Python SSL patch) ──────────────────────────────────────────
# The cluster SSL inspection proxy re-signs all outbound TLS (NAI + Telegram)
# using root-ca.local. We don't have the root CA cert, only a leaf cert.
# This sitecustomize.py is loaded at Python startup and disables cert
# verification globally for the Hermes venv — acceptable for a private
# demo cluster. Proper fix: obtain root-ca.local cert from Nutanix Prism
# (Settings → SSL Certificate) and mount it instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-ssl-patch
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: tls
data:
  sitecustomize.py: |
    import ssl

    _orig = ssl.create_default_context

    def _unverified_context(*args, **kwargs):
        ctx = _orig(*args, **kwargs)
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        return ctx

    ssl.create_default_context = _unverified_context
    ssl._create_default_https_context = ssl._create_unverified_context

---
# ── 5. ConfigMap (cli-config.yaml) ────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: config
data:
  config.yaml: |
    model:
      # Fallback values — overridden at runtime by HERMES_MODEL and OPENAI_BASE_URL env vars
      default: "${NAI_MODEL}"
      provider: "custom"
      base_url: "${OPENAI_BASE_URL}"
      # Override: bypasses Hermes's 64K minimum guard so the agent starts.
      # Actual usable context is limited by what NAI allows for this model.
      # To increase the real limit, raise max_model_len in the NAI console.
      context_length: 65536
      max_tokens: 4096
      # Increase API request timeout (seconds). Default is ~90s which is too
      # short if the NAI model is cold-loading on first request.
      request_timeout: 300

    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375

    terminal:
      backend: "local"
      timeout: 60

    gateway:
      telegram:
        enabled: true
        # TELEGRAM_BOT_TOKEN and TELEGRAM_ALLOWED_USERS injected from hermes-secrets

    # ── MCP Tool Servers ──────────────────────────────────────────────────────
    # Each entry spawns an MCP server as a stdio subprocess inside the Hermes pod.
    # To add a tool: add an entry here, re-run deploy.sh, then kubectl rollout restart.
    mcp_servers:
      time:
        command: uvx
        args: ["mcp-server-time"]

      filesystem:
        command: npx
        args:
          - "-y"
          - "@modelcontextprotocol/server-filesystem"
          - "/opt/data/workspace"

      fetch:
        command: uvx
        args: ["mcp-server-fetch"]

      # SerpAPI web search — HTTP/SSE transport (external pod, not stdio)
      serpapi:
        url: "http://mcp-serpapi:3000/sse"
        headers:
          Authorization: "Bearer ${MCP_SERPAPI_TOKEN}"

      # kubernetes MCP server disabled — its 15+ tool schemas add ~4K tokens to
      # every request, which overwhelms small models (4B params) and causes timeouts.
      # Re-enable only when the model deployment has sufficient context headroom.
      # kubernetes:
      #   command: npx
      #   args: ["-y", "mcp-server-kubernetes"]

---
# ── 4. PersistentVolumeClaim (Nutanix Files CSI) ──────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: storage
  annotations:
    # Subdirectories Hermes creates under /opt/data:
    #   cron/ sessions/ logs/ memories/ skills/ workspace/ plans/
spec:
  storageClassName: nai-nfs-storage
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi

---
# ── 5. Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hermes
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        # Start as hermes (UID 10000) directly so entrypoint.sh skips its
        # root→hermes chown/gosu step — required because Nutanix Files NFS
        # has root_squash, which blocks chown from a root container.
        # fsGroup intentionally omitted: kubelet applyFSGroup runs as root and
        # tries to chown the entire NFS mount, which root_squash also blocks.
        runAsUser: 10000
        runAsGroup: 10000

      initContainers:
        - name: config-writer
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          # command overrides ENTRYPOINT for this init container — correct here
          # since we just need a shell to seed the config, not the hermes entrypoint.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f /opt/data/config.yaml ]; then
                cp /config-src/config.yaml /opt/data/config.yaml
                echo "Wrote config.yaml to /opt/data"
              else
                echo "config.yaml already exists, skipping"
              fi
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: hermes-config-src
              mountPath: /config-src
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false

      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          # Use args (not command) so the Docker ENTRYPOINT is preserved.
          # entrypoint.sh sets up dirs, drops privileges, then runs: hermes "$@"
          # "gateway run" starts whichever gateways are enabled in cli-config.yaml.
          # Telegram is enabled via gateway.telegram.enabled: true in the ConfigMap.
          args: ["gateway", "run"]

          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: PYTHONUNBUFFERED
              value: "1"
            # OpenAI SDK native timeout — overrides Hermes's hardcoded default.
            # Set high so slow NAI cold-starts don't time out.
            - name: OPENAI_TIMEOUT
              value: "600"
            # Patch Python's ssl module at startup to disable cert verification.
            # Covers httpx (Telegram + NAI), requests, and urllib uniformly.
            # Root cause: cluster SSL inspection proxy uses root-ca.local which
            # we don't have. Proper fix: mount root-ca.local from Nutanix Prism.
            - name: PYTHONPATH
              value: /opt/ssl-patch
            # Persist MCP package caches on the PVC so uvx/npx don't
            # re-download on every pod restart.
            - name: UV_CACHE_DIR
              value: /opt/data/.cache/uv
            - name: npm_config_cache
              value: /opt/data/.cache/npm
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: OPENAI_BASE_URL
            - name: HERMES_MODEL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: NAI_MODEL
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: TELEGRAM_ALLOWED_USERS

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: hermes-ssl-patch
              mountPath: /opt/ssl-patch
              readOnly: true

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'hermes' > /dev/null"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'hermes' > /dev/null"
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 2

          securityContext:
            # entrypoint.sh handles its own privilege drop via gosu — don't restrict here
            allowPrivilegeEscalation: false

      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: hermes-config-src
          configMap:
            name: hermes-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: hermes-ssl-patch
          configMap:
            name: hermes-ssl-patch

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
# ── 6. Service ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: agent
spec:
  type: ClusterIP
  selector:
    app: hermes
  ports:
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP

---
# ── 7. NetworkPolicy ──────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-network-policy
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: network
spec:
  podSelector:
    matchLabels:
      app: hermes
  policyTypes:
    - Ingress
  ingress: []
  # Egress unrestricted — the cluster's transparent SSL inspection proxy
  # routes outbound traffic through IPs outside predictable CIDRs, making
  # destination-scoped egress rules impractical without knowing the proxy
  # topology. Ingress deny-all still prevents any inbound attack surface.
  # TODO: once the proxy's CIDR/IP is known, re-add scoped egress rules.

---
# ── 8. PodDisruptionBudget ────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hermes-pdb
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: availability
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: hermes
