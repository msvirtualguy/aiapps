# ══════════════════════════════════════════════════════════════════════════════
# NAI Admin Resources — Firecrawl MCP Connector
#
# These resources live in the nai-admin namespace and configure the NAI/Envoy
# Gateway to proxy Hermes → Firecrawl MCP via the NAI MCP Connector.
#
# Apply order:
#   1. kubectl apply -f k8s/nai-admin-resources.yaml
#   2. kubectl apply -f k8s/mcp-firecrawl.yaml          (mcp-firecrawl pod)
#   3. In NAI console → Tools → MCP Connectors:
#        Create connector named "hermes-mcp-firecrl"
#        Backend URL: https://mcp-firecrawl.hermes-agent.svc.cluster.local/mcp
#        This auto-generates an MCPRoute and a UUID-named Backend in nai-admin.
#   4. Patch the MCPRoute to use the friendly-named 'firecrawl' Backend:
#        kubectl patch mcproute hermes-mcp-firecrl -n nai-admin --type=json -p '[
#          {"op": "replace", "path": "/spec/backendRefs/0/name", "value": "firecrawl"}
#        ]'
#      This renames the tool from "nai-<uuid>__search" → "firecrawl__search",
#      which small models (4B) can recognise and invoke reliably.
#
# CA cert note:
#   mcp-firecrawl-ca must contain the root CA that signed mcp-firecrawl's
#   TLS certificate (root-ca.local, managed by cert-manager via nai-ca-issuer).
#   To export it fresh from the cluster:
#     kubectl get configmap root-ca-local -n nai-system \
#       -o jsonpath='{.data.ca\.crt}' > /tmp/root-ca.crt
#   Then replace the ca.crt value below with the contents of /tmp/root-ca.crt.
# ══════════════════════════════════════════════════════════════════════════════

---
# ── 1. CA certificate ConfigMap ───────────────────────────────────────────────
# Holds the root-ca.local CA cert so Envoy can verify mcp-firecrawl's TLS cert.
# Without this, BackendTLSPolicy defaults to System trust store (which doesn't
# include root-ca.local), causing Envoy to reject the TLS handshake with a 500.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-firecrawl-ca
  namespace: nai-admin
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-firecrawl
data:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIIDGDCCAgCgAwIBAgIRAMYXuN5199PlAe6nsTvU2lwwDQYJKoZIhvcNAQELBQAw
