---
# ── 2. Backend ────────────────────────────────────────────────────────────────
# Friendly-named Backend so the NAI/Envoy tool name is "firecrawl__search"
# instead of the auto-generated "nai-<uuid>__search".
# Small models (4B params) need a human-readable tool name to invoke it reliably.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: firecrawl
  namespace: nai-admin
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-firecrawl
spec:
  type: Endpoints
  endpoints:
    - fqdn:
        hostname: mcp-firecrawl.hermes-agent.svc.cluster.local
        port: 443

---
# ── 3. BackendTLSPolicy ───────────────────────────────────────────────────────
# Tells Envoy to verify mcp-firecrawl's TLS cert against root-ca.local.
# Without this, Envoy uses System trust (no root-ca.local) and the connection
# fails with a 500 before the request reaches mcp-firecrawl.
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: firecrawl
  namespace: nai-admin
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-firecrawl
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: firecrawl
  validation:
    hostname: mcp-firecrawl.hermes-agent.svc.cluster.local
    caCertificateRefs:
      - name: mcp-firecrawl-ca
        kind: ConfigMap
        group: ''
