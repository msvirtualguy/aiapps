# ══════════════════════════════════════════════════════════════════════════════
# SerpAPI MCP Server — HTTP/SSE transport
#
# Runs the SerpAPI MCP server as a standalone HTTP service in the hermes-agent
# namespace. Hermes connects to it over HTTP using SSE transport.
#
# Prerequisites:
#   1. Add SERPAPI_API_KEY to config/.env.template
#   2. Run: bash deploy.sh              (pushes key into hermes-secrets)
#   3. Run: kubectl apply -f k8s/mcp-serpapi.yaml
#
# Hermes config entry (already in configmap.yaml / hermes-all.yaml):
#   mcp_servers:
#     serpapi:
#       url: "http://mcp-serpapi:3000/sse"
#
# Auth: ClusterIP service — only reachable from within the cluster.
# The SERPAPI_API_KEY (to call SerpAPI's API) is injected from hermes-secrets.
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-serpapi
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-serpapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-serpapi
  template:
    metadata:
      labels:
        app: mcp-serpapi
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/component: mcp-serpapi
    spec:
      containers:
        - name: mcp-serpapi
          image: node:20-alpine
          command: ["npx", "-y", "@agentic/mcp-server-serpapi"]
          env:
            - name: PORT
              value: "3000"
            - name: SERPAPI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: SERPAPI_API_KEY
            # Bearer token clients must send as: Authorization: Bearer <token>
            - name: MCP_SERPAPI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: MCP_SERPAPI_TOKEN
          ports:
            - name: sse
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
      terminationGracePeriodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-serpapi
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-serpapi
spec:
  type: ClusterIP
  selector:
    app: mcp-serpapi
  ports:
    - name: sse
      port: 3000
      targetPort: 3000
      protocol: TCP
