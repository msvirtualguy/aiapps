# ══════════════════════════════════════════════════════════════════════════════
# SerpAPI MCP Server — official serpapi-mcp (github.com/serpapi/serpapi-mcp)
#
# Exposes the SerpAPI MCP server over HTTPS on port 443.
# TLS is terminated by an nginx sidecar using a self-signed cert generated
# at pod startup. The MCP server itself runs HTTP on localhost:8000.
#
# NAI 2.6 MCP Connector configuration:
#   URL:     https://mcp-serpapi.hermes-agent.svc.cluster.local/<SERPAPI_API_KEY>/mcp
#   Auth:    API key embedded in URL path (no separate header needed)
#   TLS:     self-signed — disable cert verification in NAI connector settings
#
# Deploy:
#   bash deploy.sh                          # ensures SERPAPI_API_KEY is in hermes-secrets
#   kubectl apply -f k8s/mcp-serpapi.yaml
# ══════════════════════════════════════════════════════════════════════════════

---
# ── ConfigMap: nginx TLS-termination config ───────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-serpapi-nginx
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-serpapi
data:
  default.conf: |
    server {
        listen      443 ssl;
        server_name _;

        ssl_certificate     /certs/cert.pem;
        ssl_certificate_key /certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass         http://localhost:8000;
            proxy_http_version 1.1;
            proxy_set_header   Connection   '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-serpapi
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-serpapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-serpapi
  template:
    metadata:
      labels:
        app: mcp-serpapi
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/component: mcp-serpapi
    spec:
      initContainers:

        # ── 1. Generate self-signed TLS certificate ─────────────────────────
        - name: gen-cert
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache openssl
              openssl req -x509 -newkey rsa:2048 -keyout /certs/key.pem -out /certs/cert.pem \
                -days 3650 -nodes \
                -subj "/CN=mcp-serpapi.hermes-agent.svc.cluster.local" \
                -addext "subjectAltName=DNS:mcp-serpapi,DNS:mcp-serpapi.hermes-agent,DNS:mcp-serpapi.hermes-agent.svc.cluster.local"
              echo "TLS cert generated"
          volumeMounts:
            - name: certs
              mountPath: /certs

        # ── 2. Download and install serpapi-mcp source ──────────────────────
        - name: install
          image: python:3.13-slim
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /app/pyproject.toml ]; then
                echo "serpapi-mcp already installed, skipping"
                exit 0
              fi
              echo "Downloading serpapi-mcp source..."
              python3 -c "
              import urllib.request, ssl
              ctx = ssl._create_unverified_context()
              req = urllib.request.Request('https://github.com/serpapi/serpapi-mcp/archive/refs/heads/main.tar.gz')
              with urllib.request.urlopen(req, context=ctx) as r, open('/tmp/serpapi-mcp.tar.gz', 'wb') as f:
                  f.write(r.read())
              "
              tar xz -C /app --strip-components=1 -f /tmp/serpapi-mcp.tar.gz
              pip install --quiet uv
              cd /app && uv sync --frozen
              echo "Install complete"
          volumeMounts:
            - name: app
              mountPath: /app

      containers:

        # ── 1. SerpAPI MCP server (HTTP, localhost:8000) ────────────────────
        - name: mcp-serpapi
          image: python:3.13-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet uv
              cd /app && exec uv run src/server.py
          env:
            - name: PORT
              value: "8000"
            - name: SERPAPI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: SERPAPI_API_KEY
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false

        # ── 2. nginx TLS termination (HTTPS:443 → HTTP:8000) ────────────────
        - name: nginx-tls
          image: nginx:alpine
          ports:
            - name: https
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false

      volumes:
        - name: app
          emptyDir: {}
        - name: certs
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: mcp-serpapi-nginx

      restartPolicy: Always
      terminationGracePeriodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-serpapi
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: mcp-serpapi
spec:
  type: ClusterIP
  selector:
    app: mcp-serpapi
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
