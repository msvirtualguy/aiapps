# ──────────────────────────────────────────────────────────────────────────────
# SECRET TEMPLATE — do NOT commit real values.
#
# Create the live secret with:
#
#   kubectl create secret generic hermes-secrets \
#     --namespace hermes-agent \
#     --from-literal=OPENAI_API_KEY='<your-nai-api-key>' \
#     --from-literal=OPENAI_BASE_URL='https://<nai-endpoint>/v1' \
#     --from-literal=NAI_MODEL='gemma-4' \
#     --from-literal=TELEGRAM_BOT_TOKEN='<token-from-botfather>' \
#     --from-literal=TELEGRAM_ALLOWED_USERS='<comma-separated-telegram-user-ids>'
#
# To rotate a value later:
#   kubectl patch secret hermes-secrets -n hermes-agent \
#     --type=json \
#     -p='[{"op":"replace","path":"/data/OPENAI_API_KEY","value":"'$(echo -n "<new-key>" | base64)'"}]'
#   kubectl rollout restart deployment/hermes -n hermes-agent
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: config
type: Opaque
stringData:
  # NAI inference endpoint API key.
  # Passed as: Authorization: Bearer <key>
  OPENAI_API_KEY: "REPLACE_WITH_NAI_API_KEY"

  # NAI inference endpoint base URL (OpenAI-compatible).
  # The OpenAI SDK reads this env var natively, overriding anything in cli-config.yaml.
  # Format: https://<host>/v1  (no trailing slash)
  OPENAI_BASE_URL: "https://REPLACE_NAI_ENDPOINT/v1"

  # Model name as registered in the NAI console (e.g. "gemma-4", "gemma-3-27b-it").
  # Injected into the container and read by Hermes via the HERMES_MODEL env var.
  NAI_MODEL: "gemma-4"

  # Telegram bot token obtained from @BotFather.
  TELEGRAM_BOT_TOKEN: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"

  # Comma-separated list of Telegram user IDs allowed to interact with the agent.
  # Find your ID by messaging @userinfobot on Telegram.
  TELEGRAM_ALLOWED_USERS: "REPLACE_WITH_TELEGRAM_USER_IDS"

  # SerpAPI key for the mcp-serpapi HTTP MCP server.
  # Obtain from https://serpapi.com/manage-api-key
  SERPAPI_API_KEY: "REPLACE_WITH_SERPAPI_API_KEY"

  # Bearer token protecting the mcp-serpapi HTTP endpoint.
  # Generate with: openssl rand -hex 32
  MCP_SERPAPI_TOKEN: "REPLACE_WITH_STRONG_RANDOM_TOKEN"
