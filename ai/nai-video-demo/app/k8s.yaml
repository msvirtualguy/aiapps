apiVersion: v1
kind: Namespace
metadata:
  name: video-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: nai-api-secret
  namespace: video-demo
type: Opaque
stringData:
  api-key: "a7e5ec97-f039-4898-9d14-e82d4f568f5b"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-demo
  namespace: video-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-demo
  template:
    metadata:
      labels:
        app: video-demo
    spec:
      containers:
        - name: video-demo
          image: registry.yourdomain.com/nkp/video-demo:v1
          ports:
            - containerPort: 8080
          env:
            - name: NAI_BASE_URL
              value: "https://nai.utech.local/enterpriseai/v1"
            - name: NAI_MODEL
              value: "cosmos-reason1-7b"
            - name: NAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nai-api-secret
                  key: api-key
---
apiVersion: v1
kind: Service
metadata:
  name: video-demo
  namespace: video-demo
spec:
  selector:
    app: video-demo
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: LoadBalancer
